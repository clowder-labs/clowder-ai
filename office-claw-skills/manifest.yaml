# OfficeClaw Skills Manifest — 路由单一真相源
# 仅登记 office-claw-skills 顶层目录下的官方技能。
# refs/ 为参考资料，不作为独立 skill 触发。
#
# 更新日期：2026-04-14
# 分类：4 大类（办公套件、企业协作、自媒体、开发与工程）

# ═══════════════════════════════════════════════════════════════════════════════
# 1. 文档与办公 (Office Productivity) — 6 个
# ═══════════════════════════════════════════════════════════════════════════════

skills:

  # ── 文档与办公 ──
  minimax-docx:
    description: >
      专业 DOCX 生成与格式化技能。基于 OpenXML SDK 处理 Word 文档创建、填充、
      套模板和结构化排版，适合正式文档交付场景。
    triggers:
      - "Word"
      - "docx"
      - "文档"
      - "报告"
      - "合同"
      - "套模板"
    not_for:
      - "PDF"
      - "电子表格"
    output: "Professionally formatted .docx"
    dependencies:
      dotnet:
        - ".NET SDK 8.0"
        - "DocumentFormat.OpenXml 3.5.1"
        - "System.CommandLine 2.0.5"
      system:
        - "bash / PowerShell setup scripts"
    next: []
    sop_step: null
    merged_from: null

  minimax-pdf:
    description: >
      高视觉质量 PDF 技能。支持从零生成设计化 PDF、填写现有 PDF 表单，
      以及把 Markdown、文本或现有文档重设计成可打印 PDF。
    triggers:
      - "make a PDF"
      - "generate a report"
      - "proposal"
      - "resume"
      - "fill out this PDF"
      - "reformat this document"
    not_for:
      - "Word 原始编辑"
      - "纯数据表格"
    output: "Print-ready PDF"
    dependencies:
      python:
        - "reportlab"
        - "pypdf"
      node:
        - "playwright"
      system:
        - "Python 3"
        - "Node.js"
        - "Chromium"
    next: []
    sop_step: null
    merged_from: null

  minimax-xlsx:
    description: >
      Excel 专业处理技能。覆盖创建、读取、分析、编辑、修复、校验 .xlsx/.xlsm/.csv/.tsv，
      强调零格式损失与公式正确性。
    triggers:
      - "spreadsheet"
      - "Excel"
      - ".xlsx"
      - ".csv"
      - "pivot table"
      - "financial model"
    not_for:
      - "Word 文档"
      - "HTML 报告"
    output: ".xlsx/.xlsm/.csv analysis or edited file"
    dependencies:
      python:
        - "pandas"
        - "openpyxl"
      system:
        - "LibreOffice (optional, recalculation)"
    next: []
    sop_step: null
    merged_from: null

  official-doc-formatter:
    description: >
      公文格式化技能。按 GB/T 9704-2012 及用户规范对请示、方案、附件等
      Word 文档进行正式排版和样式校准。
    triggers:
      - "公文格式"
      - "请示"
      - "方案"
      - "附件格式"
      - "GB/T 9704"
      - "格式化Word"
    not_for:
      - "自由创意排版"
      - "PDF 表单"
    output: "GB/T 9704 formatted Word document"
    dependencies:
      python:
        - "python-docx"
    next: []
    sop_step: null
    merged_from: null

  pptx-craft:
    description: >
      PPT 主流程技能。通过研究、规划、设计和生成的一体化流程完成高质量演示文稿，
      适用于基于主题或上传材料生成完整 PPT 的场景。
    triggers:
      - "ppt"
      - "pptx"
      - "PPT"
      - "演示文稿"
      - "幻灯片"
      - "基于文档生成PPT"
    not_for:
      - "普通文档"
      - "单页海报"
    output: ".pptx deck with research/planning artifacts"
    dependencies:
      node:
        - "@fortawesome/fontawesome-svg-core"
        - "@fortawesome/free-brands-svg-icons"
        - "@fortawesome/free-regular-svg-icons"
        - "@fortawesome/free-solid-svg-icons"
        - "esbuild"
        - "html2canvas"
        - "jszip"
        - "opentype.js"
        - "pako"
        - "playwright"
        - "pptxgenjs"
      system:
        - "Node.js >= 18"
        - "Chromium"
    next: []
    sop_step: null
    merged_from: null

  smart-report-automation:
    description: >
      智能报表自动化技能。支持 Excel 报表自动化处理、数据计算、格式美化、
      图表生成，以及 Word/Excel/PPT 到 PDF 或图片的批量格式转换。
    triggers:
      - "自动化报表"
      - "批量转PDF"
      - "Excel报表"
      - "生成图表"
      - "多格式转换"
      - "日报周报自动化"
    not_for:
      - "单个简单文档微调"
      - "纯文本总结"
    output: "Processed report files / converted office documents"
    dependencies:
      python:
        - "openpyxl>=3.1.0"
        - "pandas>=2.0.0"
        - "python-pptx>=0.6.21"
        - "python-docx>=0.8.11"
        - "pillow>=10.0.0"
        - "xlsxwriter>=3.1.0"
        - "reportlab"
      system:
        - "LibreOffice (preferred conversion engine)"
      optional:
        - "pywin32 / win32com (Windows Office COM fallback)"
    next: []
    sop_step: null
    merged_from: null

  weather:
    description: >
      天气查询技能。通过 wttr.in 或 Open-Meteo 获取当前天气和短期预报，
      适用于出行安排、行程准备和日常天气确认。
    triggers:
      - "weather"
      - "天气"
      - "forecast"
      - "temperature"
      - "会下雨吗"
      - "气温"
    not_for:
      - "历史天气数据"
      - "极端天气预警研判"
    output: "Current weather conditions / short forecast"
    dependencies:
      system:
        - "curl"
      services:
        - "wttr.in or Open-Meteo"
    next: []
    sop_step: null
    merged_from: null

  # ═══════════════════════════════════════════════════════════════════════════════
